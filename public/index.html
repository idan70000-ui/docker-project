<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management app</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js" defer></script>
</head>
<body>
      <div class="container">
        <header>
          <h1>Users Management app</h1>
          <p>view our dashboard from the DB 😎</p>
        </header>


        <div class="stats">
        <div class="stat-card">
            <div class="number" id="totalUsers">0</div>
            <div class="label">Total Users</div>
        </div>
        <div class="stat-card">
            <div class="number" id="avgAge">0</div>
            <div class="label">Average Age</div>
        </div>
        <form id="addUserForm">
            <input type="text" id="name" placeholder="Enter your Name">
            <input type="email" id="email" placeholder="Enter your Email">
            <input type="number" id="age" placeholder="Enter your Age">
            <input type="text" id="hobbies" placeholder="Enter your Hobbies">
            <input type="text" id="pets" placeholder="Enter your Pets">
            <button type="submit">Add User</button>
        </form>
        <div class="Grid" id="usersGrid">

        </div>
      </div>
</body>
</html>
